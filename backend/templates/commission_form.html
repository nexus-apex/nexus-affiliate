{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Commission | NexusAffiliate{% endblock %}
{% block page_title %}{% if editing %}Edit Commission{% else %}New Commission{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Partner Name</label>
        <input type="text" name="partner_name" value="{{ record.partner_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Referral Count</label>
        <input type="number" name="referral_count" value="{{ record.referral_count|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Period</label>
        <input type="text" name="period" value="{{ record.period|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="approved" {% if record.status == 'approved' %}selected{% endif %}>Approved</option>
          <option value="paid" {% if record.status == 'paid' %}selected{% endif %}>Paid</option>
        </select>
      </div>
      <div class="form-group">
        <label>Paid Date</label>
        <input type="date" name="paid_date" value="{{ record.paid_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Commission</button>
      <a href="/commissions/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
