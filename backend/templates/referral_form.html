{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Referral | NexusAffiliate{% endblock %}
{% block page_title %}{% if editing %}Edit Referral{% else %}New Referral{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Partner Name</label>
        <input type="text" name="partner_name" value="{{ record.partner_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Referred Email</label>
        <input type="email" name="referred_email" value="{{ record.referred_email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Product</label>
        <input type="text" name="product" value="{{ record.product|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="converted" {% if record.status == 'converted' %}selected{% endif %}>Converted</option>
          <option value="rejected" {% if record.status == 'rejected' %}selected{% endif %}>Rejected</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Click Date</label>
        <input type="date" name="click_date" value="{{ record.click_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Conversion Date</label>
        <input type="date" name="conversion_date" value="{{ record.conversion_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Commission</label>
        <input type="number" step="0.01" name="commission" value="{{ record.commission|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Referral</button>
      <a href="/referrals/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
